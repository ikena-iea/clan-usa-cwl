name: Update CWL data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest CWL data
        env:
          COC_API_TOKEN: ${{ secrets.COC_API_TOKEN }}
          CLAN_TAG: ${{ secrets.CLAN_TAG }}
        run: node scripts/fetch-cwl.mjs

      - name: Commit updated data.json
        run: |
          git config user.name "cwl-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Update CWL data"
          git push
